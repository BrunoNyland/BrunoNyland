<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" fill="none" role="img" aria-label="Bruno Nyland - Desenvolvedor Full Stack">
  <defs>
    <!-- Gradiente principal vermelho -> azul, animado -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0000">
        <animate attributeName="stop-color" values="#ff0000;#ff2a6d;#7a00ff;#0000ff;#ff0000" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0000ff">
        <animate attributeName="stop-color" values="#0000ff;#0040ff;#a300ff;#ff0000;#0000ff" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Brilho diagonal que percorre o banner -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="frame">
      <rect width="1200" height="260" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Fundo escuro -->
    <rect width="1200" height="260" fill="#0D1117"/>

    <!-- Slice geométrico principal (corte diagonal) -->
    <polygon points="0,0 1200,0 1200,150 0,260" fill="url(#grad)"/>

    <!-- Camadas diagonais translúcidas para profundidade -->
    <polygon points="0,0 1200,0 1200,110 0,210" fill="#ffffff" opacity="0.06"/>
    <polygon points="0,260 1200,150 1200,200 0,260" fill="#0000ff" opacity="0.15"/>

    <!-- Brilho que atravessa o header -->
    <rect x="-400" y="0" width="400" height="260" fill="url(#shine)" transform="skewX(-20)">
      <animate attributeName="x" values="-400;1600" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Pontos decorativos (estilo tech) -->
    <g fill="#ffffff" opacity="0.5">
      <circle cx="1080" cy="40" r="3"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="1120" cy="70" r="2"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.5s" repeatCount="indefinite"/></circle>
      <circle cx="1050" cy="80" r="2"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Texto -->
    <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" text-anchor="start">
      <text x="70" y="120" font-size="56" font-weight="800" fill="#ffffff" opacity="0">
        Bruno Nyland
        <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.2s" fill="freeze"/>
      </text>
      <text x="72" y="160" font-size="20" font-weight="500" fill="#e6edf3" opacity="0">
        Desenvolvedor Full Stack
        <animate attributeName="opacity" from="0" to="0.95" dur="1.2s" begin="0.7s" fill="freeze"/>
      </text>
      <text x="72" y="190" font-size="15" font-weight="400" fill="#9aa7b3" opacity="0" letter-spacing="1">
        Python  •  Django  •  React  •  Angular  •  Node.js
        <animate attributeName="opacity" from="0" to="0.9" dur="1.2s" begin="1.1s" fill="freeze"/>
      </text>
    </g>
  </g>
</svg>
